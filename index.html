<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hofkiste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --kale:#1F2E17;
    --paper:#F5F0E1;
    --soil:#7A5230;
    --tomato:#C1432E;
    --squash:#D9A441;
    --line: rgba(31,46,23,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--kale);
    font-family:'Work Sans', sans-serif;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(31,46,23,0.06) 1px, transparent 0);
    background-size: 18px 18px;
  }
  .wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}

  header.site{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:8px;}
  .brand{font-family:'Fraunces',serif;font-weight:700;font-size:28px;letter-spacing:-0.01em;}
  .brand span{color:var(--tomato);}
  .tagline{font-size:13px;color:var(--soil);}

  nav.tabs{display:flex;gap:0;border-bottom:2px solid var(--kale);margin-bottom:26px;}
  nav.tabs button{
    font-family:'Work Sans',sans-serif;font-weight:600;font-size:14px;
    background:none;border:none;cursor:pointer;color:var(--soil);
    padding:10px 16px;position:relative;top:2px;
  }
  nav.tabs button.active{color:var(--kale);border-bottom:2px solid var(--tomato);}

  /* Crate ticket - signature element */
  .ticket{
    background:#fff;
    border:1px solid var(--line);
    border-radius:4px;
    padding:22px 24px;
    position:relative;
    box-shadow:0 1px 0 rgba(31,46,23,0.05);
    margin-bottom:18px;
  }
  .ticket::before{
    content:"";position:absolute;left:0;right:0;top:0;height:6px;
    background:repeating-linear-gradient(90deg,var(--kale) 0 10px, transparent 10px 18px);
    border-radius:4px 4px 0 0;
  }
  .ticket-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-top:6px;}
  .ticket-week{font-family:'Fraunces',serif;font-weight:600;font-size:22px;}
  .stamp{
    font-family:'Fraunces',serif;font-weight:700;font-size:11px;letter-spacing:0.08em;
    color:var(--tomato);border:1.5px solid var(--tomato);border-radius:999px;
    padding:4px 10px;transform:rotate(3deg);white-space:nowrap;text-transform:uppercase;
  }
  .ticket-date{font-size:12px;color:var(--soil);margin-top:2px;}
  .ticket p{font-size:14.5px;line-height:1.6;margin:14px 0 0;}
  .recipe-box{
    margin-top:14px;background:var(--paper);border-left:3px solid var(--squash);
    padding:10px 14px;font-size:14px;line-height:1.55;
  }
  .recipe-box b{font-family:'Fraunces',serif;font-weight:600;}

  h2.section-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:26px 0 12px;}

  .card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:18px 20px;margin-bottom:14px;}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--soil);margin:12px 0 5px;text-transform:uppercase;letter-spacing:0.03em;}
  input, textarea, select{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:3px;
    font-family:'Work Sans',sans-serif;font-size:14px;background:#fffdf9;color:var(--kale);
  }
  textarea{resize:vertical;min-height:70px;}
  input:focus, textarea:focus, select:focus{outline:2px solid var(--tomato);outline-offset:1px;}

  button.btn{
    margin-top:16px;background:var(--tomato);color:#fff;border:none;
    padding:10px 20px;border-radius:3px;font-weight:600;font-size:14px;cursor:pointer;
    font-family:'Work Sans',sans-serif;
  }
  button.btn:hover{background:#a83722;}
  button.btn.secondary{background:none;color:var(--kale);border:1px solid var(--kale);}
  button.btn.secondary:hover{background:var(--kale);color:#fff;}
  button.btn.small{padding:6px 12px;font-size:12.5px;margin-top:0;}
  button.btn:disabled{opacity:0.6;cursor:default;}

  .status{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:3px 9px;border-radius:999px;}
  .status.pending{background:#f4e3c2;color:#7a5230;}
  .status.approved{background:#dcebd2;color:#2c5223;}
  .status.abgelehnt{background:#f4dcd6;color:#8a2f1f;}

  .pin{
    font-family:'Fraunces',serif;font-weight:700;font-size:26px;letter-spacing:0.15em;
    background:var(--kale);color:var(--squash);padding:8px 16px;border-radius:4px;display:inline-block;margin-top:8px;
  }

  .empty{color:var(--soil);font-size:14px;font-style:italic;padding:10px 0;}
  .msg{font-size:13px;padding:9px 12px;border-radius:3px;margin-top:12px;}
  .msg.ok{background:#dcebd2;color:#2c5223;}
  .msg.err{background:#f4dcd6;color:#8a2f1f;}

  .req-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding:10px 0;flex-wrap:wrap;gap:8px;}
  .req-row:first-child{border-top:none;}
  .req-meta{font-size:13px;}
  .req-meta b{font-family:'Fraunces',serif;}
  .muted{color:var(--soil);font-size:12px;}

  /* Honeypot-Feld: für Menschen unsichtbar, für simple Bots aber ausfüllbar */
  .hp{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;}

  .admin-lock{max-width:320px;margin:40px auto;text-align:center;}
  .footer-note{font-size:11.5px;color:var(--soil);text-align:center;margin-top:40px;line-height:1.6;}
  .footer-note a{color:var(--soil);}
  .link-btn{background:none;border:none;color:var(--soil);text-decoration:underline;font-size:12px;cursor:pointer;padding:0;margin-top:10px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script src="config.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

const pageLoadedAt = Date.now();
const MIN_FORM_TIME_MS = 1500; // simple Bot-Bremse: Formulare, die schneller als das abgeschickt werden, wirken automatisiert

// Einladungs-/Passwort-Reset-Links landen mit #access_token=...&type=invite (oder type=recovery)
// im URL-Hash. Den Typ merken wir uns hier, BEVOR supabase-js den Hash beim Session-Aufbau entfernt.
const initialAuthFlowType = new URLSearchParams(window.location.hash.slice(1)).get('type');

const app = document.getElementById('app');
let state = {
  tab: 'home',
  session: null,
  me: null,          // customers-Zeile der eingeloggten Person
  isAdmin: false,
  posts: [],
  requests: [],       // eigene Anfragen (Kund:in) bzw. alle (Admin)
  customers: [],       // nur für Admin geladen
  msg: null,
  busy: false,
  // Nach Klick auf Einladungs-/Passwort-vergessen-Link: erst Passwort (+Name) festlegen,
  // bevor die Person normal weiterklicken kann.
  pendingPasswordSetup: initialAuthFlowType === 'invite' || initialAuthFlowType === 'recovery',
  // Entwurf des Admin-Veröffentlichen-Formulars. render() baut das DOM bei jeder Statusänderung
  // komplett neu auf, daher müssen die Feldwerte hier zwischengespeichert werden, sonst gehen sie
  // z.B. beim Klick auf "Rezept vorschlagen" verloren.
  draftPost: { week: '', content: '', recipeTitle: '', recipeText: '' },
  suggestingRecipe: false,
  recipeMsg: null
};

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadPosts(){
  const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
  if(!error) state.posts = data || [];
}

async function loadMyAccount(){
  if(!state.session) { state.me = null; return; }
  const uid = state.session.user.id;
  const { data: customer } = await supabase.from('customers').select('*').eq('id', uid).maybeSingle();
  state.me = customer || null;

  const { data: admin } = await supabase.from('admins').select('*').eq('id', uid).maybeSingle();
  state.isAdmin = !!admin;

  if(state.isAdmin){
    const { data: allReq } = await supabase.from('requests').select('*').order('created_at', { ascending: false });
    state.requests = allReq || [];
    const { data: allCust } = await supabase.from('customers').select('*').order('created_at', { ascending: false });
    state.customers = allCust || [];
  } else if(state.me){
    const { data: myReq } = await supabase.from('requests').select('*').eq('customer_id', state.me.id).order('created_at', { ascending: false });
    state.requests = myReq || [];
  }
}

async function loadAll(){
  const { data: { session } } = await supabase.auth.getSession();
  state.session = session;
  await Promise.all([loadPosts(), loadMyAccount()]);
  render();
}

function setTab(t){ state.tab = t; state.msg = null; render(); }

// ---- Aktionen -----------------------------------------------------------

async function customerLogin(email, password){
  state.busy = true; render();
  try{
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error) throw error;
    state.msg = null;
    await loadAll();
  } catch(e){
    state.msg = { type: 'err', text: 'Login fehlgeschlagen: ' + e.message };
  } finally {
    state.busy = false; render();
  }
}

async function forgotPassword(email){
  state.busy = true; render();
  try{
    const { error } = await supabase.auth.resetPasswordForEmail(email);
    if(error) throw error;
  } catch(e){
    // Absichtlich keine unterschiedliche Fehlermeldung je nachdem, ob die E-Mail existiert
    // (kein User-Enumeration-Vektor). Supabase selbst verhält sich hier bereits so.
  } finally {
    state.msg = { type: 'ok', text: 'Falls ein Konto mit dieser E-Mail existiert, wurde ein Link zum Zurücksetzen verschickt.' };
    state.busy = false; render();
  }
}

async function setPasswordAndName(name, password){
  state.busy = true; render();
  try{
    const { data, error } = await supabase.auth.updateUser({ password, data: { name } });
    if(error) throw error;
    const { error: upErr } = await supabase.from('customers')
      .upsert({ id: data.user.id, name, email: data.user.email }, { onConflict: 'id' });
    if(upErr) throw upErr;
    state.pendingPasswordSetup = false;
    state.tab = 'account';
    state.msg = { type: 'ok', text: `Willkommen, ${name}! Dein Passwort ist gesetzt.` };
    await loadAll();
  } catch(e){
    state.msg = { type: 'err', text: 'Fehler: ' + e.message };
  } finally {
    state.busy = false; render();
  }
}

async function submitRequest(date, note){
  state.busy = true; render();
  try{
    const { error } = await supabase.from('requests').insert({
      customer_id: state.me.id, requested_date: date, note: note || null
    });
    if(error) throw error;
    state.msg = { type: 'ok', text: 'Anfrage gesendet. Du bekommst hier Bescheid, sobald sie bestätigt ist.' };
    await loadAll();
  } catch(e){
    state.msg = { type: 'err', text: 'Anfrage fehlgeschlagen: ' + e.message };
  } finally {
    state.busy = false; render();
  }
}

async function approveRequest(id){
  const pin = String(Math.floor(1000 + Math.random()*9000));
  const { error } = await supabase.from('requests').update({ status: 'approved', pin }).eq('id', id);
  if(!error) await loadAll(); else { state.msg = { type:'err', text: error.message }; render(); }
}

async function rejectRequest(id){
  const { error } = await supabase.from('requests').update({ status: 'abgelehnt' }).eq('id', id);
  if(!error) await loadAll(); else { state.msg = { type:'err', text: error.message }; render(); }
}

async function publishPost(week, content, recipeTitle, recipeText){
  state.busy = true; render();
  try{
    const { error } = await supabase.from('posts').insert({
      title: week, week, content, recipe_title: recipeTitle || null, recipe_text: recipeText || null,
      created_by: state.session.user.id
    });
    if(error) throw error;
    state.msg = { type: 'ok', text: 'Beitrag veröffentlicht.' };
    state.recipeMsg = null;
    state.draftPost = { week: '', content: '', recipeTitle: '', recipeText: '' };
    await loadAll();
  } catch(e){
    state.msg = { type: 'err', text: 'Veröffentlichen fehlgeschlagen: ' + e.message };
  } finally {
    state.busy = false; render();
  }
}

async function suggestRecipe(ingredients){
  state.suggestingRecipe = true; state.recipeMsg = null; render();
  try{
    const { data, error } = await supabase.functions.invoke('suggest-recipe', { body: { ingredients } });
    if(error) throw error;
    if(data?.error) throw new Error(data.error);
    state.draftPost.recipeTitle = data.title || '';
    state.draftPost.recipeText = data.text || '';
    state.recipeMsg = { type: 'ok', text: `Rezeptvorschlag übernommen (Quelle: ${data.sourceUrl || 'Spoonacular'}). Ist auf Englisch — bitte vor dem Veröffentlichen prüfen/übersetzen.` };
  } catch(e){
    state.recipeMsg = { type: 'err', text: 'Rezeptvorschlag fehlgeschlagen: ' + e.message };
  } finally {
    state.suggestingRecipe = false; render();
  }
}

async function adminLogin(email, password){
  state.busy = true; render();
  try{
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error) throw error;
    state.msg = null;
    await loadAll();
  } catch(e){
    state.msg = { type: 'err', text: 'Login fehlgeschlagen: ' + e.message };
  } finally {
    state.busy = false; render();
  }
}

async function signOut(){
  await supabase.auth.signOut();
  state = {
    tab: 'home', session: null, me: null, isAdmin: false, posts: state.posts, requests: [], customers: [],
    msg: null, busy: false, pendingPasswordSetup: false,
    draftPost: { week: '', content: '', recipeTitle: '', recipeText: '' }, suggestingRecipe: false, recipeMsg: null
  };
  await loadAll();
}

// ---- Rendering ------------------------------------------------------------

function renderHome(){
  const latest = state.posts[0];
  const older = state.posts.slice(1,5);
  let html = '<h2 class="section-title">Diese Woche</h2>';
  if(latest){
    html += `
      <div class="ticket">
        <div class="ticket-head">
          <div>
            <div class="ticket-week">${esc(latest.week || latest.title)}</div>
            <div class="ticket-date">Veröffentlicht am ${new Date(latest.created_at).toLocaleDateString('de-DE')}</div>
          </div>
          <div class="stamp">Frisch geerntet</div>
        </div>
        <p>${esc(latest.content).replace(/\n/g,'<br>')}</p>
        ${latest.recipe_text ? `<div class="recipe-box"><b>Rezeptidee: ${esc(latest.recipe_title||'')}</b><br>${esc(latest.recipe_text).replace(/\n/g,'<br>')}</div>` : ''}
      </div>`;
  } else {
    html += `<div class="empty">Noch keine Kisten-News. Schau bald wieder vorbei.</div>`;
  }
  if(older.length){
    html += '<h2 class="section-title">Ältere Beiträge</h2>';
    older.forEach(p => {
      html += `<div class="card">
        <div class="ticket-week" style="font-size:16px;">${esc(p.week || p.title)}</div>
        <div class="ticket-date">${new Date(p.created_at).toLocaleDateString('de-DE')}</div>
        <p style="margin-top:8px;">${esc(p.content).replace(/\n/g,'<br>')}</p>
      </div>`;
    });
  }
  return html;
}

function renderSetPassword(){
  return `
    <div class="admin-lock">
      <h2 class="section-title">Willkommen bei Hofkiste!</h2>
      <p class="muted">Du wurdest eingeladen. Leg dir einmalig einen Namen und ein Passwort fest.</p>
      <label for="sp-name">Name</label>
      <input id="sp-name" placeholder="Vor- und Nachname">
      <label for="sp-pw">Neues Passwort</label>
      <input id="sp-pw" type="password" placeholder="mind. 8 Zeichen">
      <label for="sp-pw2">Passwort bestätigen</label>
      <input id="sp-pw2" type="password">
      <button class="btn" ${state.busy?'disabled':''} onclick="handleSetPassword()">Passwort festlegen</button>
      ${state.msg ? `<div class="msg ${state.msg.type}">${esc(state.msg.text)}</div>` : ''}
    </div>`;
}

function renderAccount(){
  if(!state.me){
    return `
      <h2 class="section-title">Anmelden</h2>
      <div class="card">
        <p style="font-size:13.5px;color:var(--soil);margin:0 0 4px;">Konten werden von der Kistenverwaltung angelegt. Du bekommst eine Einladungs-E-Mail, mit der du dir ein Passwort einrichtest.</p>
        <label for="c-email">E-Mail</label>
        <input id="c-email" type="email" placeholder="du@beispiel.de">
        <label for="c-pass">Passwort</label>
        <input id="c-pass" type="password">
        <button class="btn" ${state.busy?'disabled':''} onclick="handleCustomerLogin()">Einloggen</button>
        <button class="link-btn" ${state.busy?'disabled':''} onclick="handleForgotPassword()">Passwort vergessen?</button>
        ${state.msg ? `<div class="msg ${state.msg.type}">${esc(state.msg.text)}</div>` : ''}
      </div>`;
  }
  const myRequests = state.requests;
  let html = `
    <h2 class="section-title">Mein Konto</h2>
    <div class="card">
      <div style="font-family:'Fraunces',serif;font-weight:600;font-size:17px;">${esc(state.me.name)}</div>
      <div class="muted">${esc(state.me.email)}</div>
      <button class="link-btn" onclick="handleSignOut()">Abmelden</button>
    </div>

    <h2 class="section-title">Alternativtermin anfragen</h2>
    <div class="card">
      <p style="font-size:13.5px;color:var(--soil);margin:0;">Kannst du nicht am regulären Abholtag? Frag hier einen anderen Termin an. Nach Bestätigung bekommst du hier den PIN für den Abholraum.</p>
      <label for="req-date">Gewünschtes Datum</label>
      <input id="req-date" type="date">
      <label for="req-note">Notiz (optional)</label>
      <textarea id="req-note" placeholder="z.B. bevorzugte Uhrzeit"></textarea>
      <div class="hp" aria-hidden="true"><label for="req-company">Firma</label><input id="req-company" tabindex="-1" autocomplete="off"></div>
      <button class="btn" ${state.busy?'disabled':''} onclick="handleRequest()">Anfrage senden</button>
      ${state.msg ? `<div class="msg ${state.msg.type}">${esc(state.msg.text)}</div>` : ''}
    </div>

    <h2 class="section-title">Meine Anfragen</h2>`;
  if(!myRequests.length){
    html += `<div class="empty">Noch keine Anfragen gestellt.</div>`;
  } else {
    html += `<div class="card">`;
    myRequests.forEach(r => {
      html += `<div class="req-row">
        <div class="req-meta"><b>${esc(r.requested_date)}</b>${r.note ? ' · ' + esc(r.note) : ''}
          ${r.status === 'approved' ? `<div class="pin">${esc(r.pin)}</div><div class="muted">PIN für den Abholraum</div>` : ''}
        </div>
        <span class="status ${r.status}">${esc(r.status)}</span>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderAdmin(){
  if(!state.session || !state.isAdmin){
    return `
      <div class="admin-lock">
        <h2 class="section-title">Admin-Bereich</h2>
        <p class="muted">Nur für dich als Kistenmanager:in.</p>
        <label for="admin-email">E-Mail</label>
        <input id="admin-email" type="email" placeholder="admin@hofkiste.de">
        <label for="admin-pass">Passwort</label>
        <input id="admin-pass" type="password" placeholder="Passwort">
        <button class="btn" ${state.busy?'disabled':''} onclick="handleAdminLogin()">Einloggen</button>
        ${state.msg ? `<div class="msg ${state.msg.type}">${esc(state.msg.text)}</div>` : ''}
        <p class="footer-note">Admin-Konten werden im Supabase Dashboard angelegt und in der Tabelle <b>admins</b> eingetragen.</p>
      </div>`;
  }

  const pending = state.requests.filter(r => r.status === 'pending');
  const handled = state.requests.filter(r => r.status !== 'pending');

  let html = `
    <div style="text-align:right;"><button class="link-btn" onclick="handleSignOut()">Abmelden</button></div>
    <h2 class="section-title">Neuen Beitrag veröffentlichen</h2>
    <div class="card">
      <label for="p-week">Wochen-Titel</label>
      <input id="p-week" placeholder="z.B. KW 27 · 30. Juni – 6. Juli" value="${esc(state.draftPost.week)}">
      <label for="p-content">Was ist diese Woche in der Kiste?</label>
      <textarea id="p-content" placeholder="z.B. Zucchini, Tomaten, Salat, Kartoffeln, Kräuterbund ...">${esc(state.draftPost.content)}</textarea>
      <button type="button" class="btn secondary small" ${state.suggestingRecipe?'disabled':''} onclick="handleSuggestRecipe()">${state.suggestingRecipe ? 'Rezept wird gesucht …' : 'Rezept vorschlagen'}</button>
      <p class="muted" style="margin-top:8px;">Schlägt anhand der Zutaten oben ein Rezept vor (via Spoonacular). Ergebnis ist Englisch — bitte vor dem Veröffentlichen prüfen/übersetzen.</p>
      ${state.recipeMsg ? `<div class="msg ${state.recipeMsg.type}">${esc(state.recipeMsg.text)}</div>` : ''}
      <label for="p-recipe-title">Rezeptidee – Titel (optional)</label>
      <input id="p-recipe-title" placeholder="z.B. Ofengemüse mit Kräutern" value="${esc(state.draftPost.recipeTitle)}">
      <label for="p-recipe-text">Rezeptidee – Beschreibung</label>
      <textarea id="p-recipe-text" placeholder="Kurzanleitung ...">${esc(state.draftPost.recipeText)}</textarea>
      <button class="btn" ${state.busy?'disabled':''} onclick="handlePublish()">Veröffentlichen</button>
      ${state.msg ? `<div class="msg ${state.msg.type}">${esc(state.msg.text)}</div>` : ''}
    </div>

    <h2 class="section-title">Offene Alternativtermin-Anfragen (${pending.length})</h2>`;
  if(!pending.length){
    html += `<div class="empty">Keine offenen Anfragen.</div>`;
  } else {
    html += `<div class="card">`;
    pending.forEach(r => {
      const cust = state.customers.find(c => c.id === r.customer_id);
      html += `<div class="req-row">
        <div class="req-meta"><b>${esc(cust?.name || '—')}</b> · ${esc(r.requested_date)}${r.note ? ' · ' + esc(r.note) : ''}
          <div class="muted">${esc(cust?.email || '')}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn small" onclick="approveRequest('${r.id}')">PIN vergeben & bestätigen</button>
          <button class="btn small secondary" onclick="rejectRequest('${r.id}')">Ablehnen</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<h2 class="section-title">Kund:innen (${state.customers.length})</h2>
    <div class="card">`;
  if(!state.customers.length){
    html += `<div class="empty">Noch niemand registriert.</div>`;
  } else {
    state.customers.forEach(c => {
      html += `<div class="req-row"><div class="req-meta"><b>${esc(c.name)}</b><div class="muted">${esc(c.email)}</div></div></div>`;
    });
  }
  html += `</div>`;

  if(handled.length){
    html += `<h2 class="section-title">Bearbeitete Anfragen</h2><div class="card">`;
    handled.forEach(r => {
      const cust = state.customers.find(c => c.id === r.customer_id);
      html += `<div class="req-row">
        <div class="req-meta"><b>${esc(cust?.name || '—')}</b> · ${esc(r.requested_date)}</div>
        <span class="status ${r.status}">${esc(r.status)}</span>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function render(){
  const showNav = !state.pendingPasswordSetup;
  app.innerHTML = `
    <header class="site">
      <div>
        <div class="brand">Hof<span>kiste</span></div>
        <div class="tagline">Wöchentlich frisch. Direkt vom Feld in deine Kiste.</div>
      </div>
    </header>
    ${showNav ? `
    <nav class="tabs">
      <button class="${state.tab==='home'?'active':''}" onclick="setTab('home')">Diese Woche</button>
      <button class="${state.tab==='account'?'active':''}" onclick="setTab('account')">Mein Konto</button>
      <button class="${state.tab==='admin'?'active':''}" onclick="setTab('admin')">Admin</button>
    </nav>` : ''}
    <div id="tab-content"></div>
    <div class="footer-note">Hofkiste · Daten werden sicher in Supabase gespeichert.<br>
      <a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a>
    </div>
  `;
  const content = document.getElementById('tab-content');
  if(state.pendingPasswordSetup){ content.innerHTML = renderSetPassword(); return; }
  if(state.tab === 'home') content.innerHTML = renderHome();
  if(state.tab === 'account') content.innerHTML = renderAccount();
  if(state.tab === 'admin') content.innerHTML = renderAdmin();
}

window.setTab = setTab;

function looksLikeBot(honeypotValue){
  // Honeypot ausgefüllt oder Formular unrealistisch schnell abgeschickt -> vermutlich Bot.
  return !!honeypotValue || (Date.now() - pageLoadedAt) < MIN_FORM_TIME_MS;
}

window.handleCustomerLogin = async function(){
  const email = document.getElementById('c-email').value.trim();
  const password = document.getElementById('c-pass').value;
  if(!email || !password){ state.msg = {type:'err', text:'Bitte E-Mail und Passwort angeben.'}; render(); return; }
  await customerLogin(email, password);
};

window.handleForgotPassword = async function(){
  const email = document.getElementById('c-email').value.trim();
  if(!email){ state.msg = {type:'err', text:'Bitte zuerst deine E-Mail-Adresse eingeben.'}; render(); return; }
  await forgotPassword(email);
};

window.handleSetPassword = async function(){
  const name = document.getElementById('sp-name').value.trim();
  const pw = document.getElementById('sp-pw').value;
  const pw2 = document.getElementById('sp-pw2').value;
  if(!name){ state.msg = {type:'err', text:'Bitte einen Namen angeben.'}; render(); return; }
  if(pw.length < 8){ state.msg = {type:'err', text:'Das Passwort muss mindestens 8 Zeichen haben.'}; render(); return; }
  if(pw !== pw2){ state.msg = {type:'err', text:'Die Passwörter stimmen nicht überein.'}; render(); return; }
  await setPasswordAndName(name, pw);
};

window.handleRequest = async function(){
  const date = document.getElementById('req-date').value;
  const note = document.getElementById('req-note').value.trim();
  const honeypot = document.getElementById('req-company').value.trim();
  if(looksLikeBot(honeypot)){
    state.msg = { type: 'ok', text: 'Anfrage gesendet. Du bekommst hier Bescheid, sobald sie bestätigt ist.' }; render(); return;
  }
  if(!date){ state.msg = {type:'err', text:'Bitte ein Datum wählen.'}; render(); return; }
  await submitRequest(date, note);
};

window.approveRequest = approveRequest;
window.rejectRequest = rejectRequest;

window.handlePublish = async function(){
  const week = document.getElementById('p-week').value.trim();
  const content = document.getElementById('p-content').value.trim();
  const recipeTitle = document.getElementById('p-recipe-title').value.trim();
  const recipeText = document.getElementById('p-recipe-text').value.trim();
  state.draftPost = { week, content, recipeTitle, recipeText };
  if(!week || !content){ state.msg = {type:'err', text:'Bitte Titel und Inhalt angeben.'}; render(); return; }
  await publishPost(week, content, recipeTitle, recipeText);
};

window.handleSuggestRecipe = async function(){
  const week = document.getElementById('p-week').value.trim();
  const content = document.getElementById('p-content').value.trim();
  const recipeTitle = document.getElementById('p-recipe-title').value.trim();
  const recipeText = document.getElementById('p-recipe-text').value.trim();
  state.draftPost = { week, content, recipeTitle, recipeText };
  if(!content){ state.recipeMsg = {type:'err', text:'Bitte zuerst eintragen, was in der Kiste ist.'}; render(); return; }
  await suggestRecipe(content);
};

window.handleAdminLogin = async function(){
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-pass').value;
  if(!email || !password){ state.msg = {type:'err', text:'Bitte E-Mail und Passwort angeben.'}; render(); return; }
  await adminLogin(email, password);
};

window.handleSignOut = signOut;

supabase.auth.onAuthStateChange((event, session) => {
  state.session = session;
  // Zusätzliches Sicherheitsnetz zur URL-Hash-Prüfung oben: falls supabase-js bei einem
  // Recovery-Link das PASSWORD_RECOVERY-Event feuert, auch dann den Set-Password-Screen erzwingen.
  if(event === 'PASSWORD_RECOVERY'){ state.pendingPasswordSetup = true; }
  render();
});

loadAll();
</script>
</body>
</html>
